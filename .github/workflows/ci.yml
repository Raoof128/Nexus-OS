name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_AUTH_KEY: test-auth-key
      SUPABASE_JWT_SECRET: test-secret
      AUDIT_LOG_SALT: test-audit-salt
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint (Ruff)
        run: |
          python -m ruff check backend tests
          python -m ruff format --check backend tests
      - name: Test (Pytest)
        run: python -m pytest
      - name: Security (Bandit)
        run: python -m bandit -r backend -c bandit.yaml
      - name: Security (pip-audit)
        # Scope to project deps only (avoids flagging runner-level packages).
        # PYSEC-2025-183: PyJWT 2.12.1 — no patched release yet.
        # PYSEC-2024-271: flask-cors (transitive via locust dev dep, not in
        #   production runtime) — no patched release yet.
        # Remove each --ignore-vuln entry once upstream publishes a fix.
        run: >-
          python -m pip_audit .
          --ignore-vuln PYSEC-2025-183
          --ignore-vuln PYSEC-2024-271

  frontend:
    name: Frontend (Node 24)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_URL: http://127.0.0.1:8000
      VITE_SENTRY_DSN: https://public@example.ingest.sentry.io/1
      VITE_SUPABASE_URL: http://127.0.0.1:54321
      VITE_SUPABASE_ANON_KEY: test-anon-key
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (ESLint)
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Test (Vitest)
        run: npm run test
      - name: Security (npm audit)
        run: npm audit --audit-level=high

  secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      # gitleaks-action: using semver tag (v2.3.7) — SHA pinning requires
      # verifying the exact commit hash against the upstream repo.
      - uses: gitleaks/gitleaks-action@v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  operations:
    name: Infrastructure & Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # hashicorp/setup-terraform: using semver tag — SHA pinning requires
      # verifying the exact commit hash against the upstream repo.
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.8'
      - name: Validate Terraform formatting
        run: terraform -chdir=infra/terraform fmt -check -recursive
      - name: Build Backend Container
        run: docker build -f backend/Dockerfile -t nexus-os-backend .

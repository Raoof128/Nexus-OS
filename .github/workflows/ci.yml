name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_AUTH_KEY: test-auth-key
      SUPABASE_JWT_SECRET: test-secret
      AUDIT_LOG_SALT: test-audit-salt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint backend
        run: |
          python -m ruff check backend tests loadtests
          python -m ruff format --check backend tests loadtests
      - name: Test backend
        run: python -m pytest
      - name: Run Bandit
        run: python -m bandit -r backend -c bandit.yaml
      - name: Run pip-audit
        run: python -m pip_audit

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_URL: http://127.0.0.1:8000
      VITE_SENTRY_DSN: https://public@example.ingest.sentry.io/1
      VITE_SENTRY_TRACES_SAMPLE_RATE: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Build frontend
        run: npm run build
      - name: Run frontend tests
        run: npm run test
      - name: Run npm audit
        run: npm audit --audit-level=high

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  operations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - name: Validate Terraform formatting
        run: terraform -chdir=infra/terraform fmt -check -recursive
      - name: Build backend container
        run: docker build -f backend/Dockerfile -t nexus-archive-backend .

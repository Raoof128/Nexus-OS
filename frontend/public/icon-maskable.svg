<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00f5ff"/>
      <stop offset="1" stop-color="#7000ff"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background: the platform applies its own mask (circle, squircle,
       rounded square), so no corner radius here. The glyph sits inside the
       central ~60% safe zone so it is never clipped. -->
